name: geonotes
requiredPermissions:
  - fetch
assets:
  - assets/**/*.*
functions:
  mapWidget:
    path: ./src/main.ts:mapWidget
    codeWidget: map

  indexGeoLinks:
    path: ./src/main.ts:indexGeoLinks
    events:
      - page:index

  geoLinkClick:
    path: ./src/main.ts:geoLinkClick
    events:
      - page:click

  completeGeolink:
    path: ./src/main.ts:completeGeolink
    events:
      - editor:complete
