name: geonotes
requiredPermissions:
  - fetch
assets:
  - assets/**/*.*
functions:
  mapWidget:
    path: ./src/main.ts:mapWidget
    codeWidget: map

  indexGeoLinks:
    path: ./src/main.ts:indexGeoLinks
    events:
      - page:index

  geoLinkClick:
    path: ./src/main.ts:geoLinkClick
    events:
      - page:click

  completeGeolink:
    path: ./src/main.ts:completeGeolink
    events:
      - editor:complete

  insertGeolink:
    path: ./src/main.ts:insertGeolink
    slashCommand:
      name: geolink
      description: Insert a geolink

  insertMap:
    path: ./src/main.ts:insertMap
    slashCommand:
      name: map
      description: Insert a map widget
