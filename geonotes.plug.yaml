name: geonotes
requiredPermissions:
  - fetch
functions:
  mapWidget:
    path: ./geonotes.ts:mapWidget
    codeWidget: map

  indexGeoLinks:
    path: ./geonotes.ts:indexGeoLinks
    events:
      - page:index

  geoLinkClick:
    path: ./geonotes.ts:geoLinkClick
    events:
      - page:click

  completeGeolink:
    path: ./geonotes.ts:completeGeolink
    events:
      - editor:complete
